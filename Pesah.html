<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>חידות לפסח 🐣</title>
<style>
body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(to bottom, #fff8dc, #ffd700);
    direction: rtl;
}

h1 {
    color: #8B0000;
}

.quiz-box {
    background: white;
    padding: 20px;
    border-radius: 15px;
    width: 300px;
    margin: auto;
    box-shadow: 0 0 10px gray;
}

button {
    margin: 5px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    background: #ffcc00;
}

button:hover {
    background: orange;
}
</style>
</head>

<body>

<h1>🎉 חידון פסח 🎉</h1>

<div class="quiz-box">
    <h2 id="question">טוען שאלה...</h2>
    <div id="answers"></div>
    <h3 id="score">ניקוד: 0</h3>
</div>

<!-- מוזיקה -->
<audio id="music" autoplay loop>
    <source src="https://www.prog.co.il/attachments/02-%D7%A2%D7%91%D7%93%D7%99%D7%9D-%D7%94%D7%99%D7%99%D7%A0%D7%95-mp3.632131/" type="audio/mpeg">
</audio>

<script>
const questions = [
    {
        q: "מה אוכלים בפסח?",
        a: ["פיתה", "מצה", "לחמניה", "פסטה"],
        correct: 1
    },
    {
        q: "איך נקרא ערב חג הפסח?",
        a: ["סעודת חג", "ליל הסדר", "מסיבת פסח", "לילה לבן"],
        correct: 1
    },
    {
        q: "כמה מכות היו במצרים?",
        a: ["5", "7", "10", "12"],
        correct: 2
    },
    {
        q: "מה שותים בליל הסדר?",
        a: ["מים", "מיץ תפוזים", "4 כוסות יין", "קולה"],
        correct: 2

    },
    {
        q: "מה הפרוש של המילה אפיקומן?",
        a: ["עוגיה", "קינוח", "הפתעה", "עוגה"],
        correct: 2

    },
    {
        q: "באיזה חודש יצאו בני ישראל ממצרים? ?",
        a: ["ניסן", "שבט", "תמוז", "אלול"],
        correct: 1

    },
    {
        q: "מה היא המכה האחרונה? ?",
        a: ["דם", "כינים", "מקת הבכורות", "חושך"],
        correct: 2

    },
    {
        q: "מה יוצה דופן? ?",
        a: ["דם", "כינים", "מקת הבכורות", "אלול"],
        correct: 1
    }
];

let current = 0;
let score = 0;

function loadQuestion() {
    const q = questions[current];
    document.getElementById("question").innerText = q.q;
    const answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    q.a.forEach((ans, index) => {
        const btn = document.createElement("button");
        btn.innerText = ans;
        btn.onclick = () => checkAnswer(index);
        answersDiv.appendChild(btn);
    });
}

function checkAnswer(index) {
    if(index === questions[current].correct) {
        score++;
        alert("נכון! 🎉");
    } else {
        alert("לא נכון 😅");
    }

    current++;

    if(current < questions.length) {
        loadQuestion();
    } else {
        document.querySelector(".quiz-box").innerHTML =
            "<h2>סיימת! 🎉</h2><h3>הניקוד שלך: " + score + "</h3>";
    }

    document.getElementById("score").innerText = "ניקוד: " + score;
}

loadQuestion();
</script>

</body>
</html>
