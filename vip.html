<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>החנות של עמית, רון ואיתי</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    direction: rtl;
    background-color: #111;
    color: #fff;
    margin-top:100px;
}

input{
    padding:10px;
    font-size:16px;
}

button{
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
}

#result{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}
.home-button {
    position: fixed;
    top: 15px;
    right: 15px;
    background-color: #4CAF50;
    color: white;
    font-size: 22px;
    padding: 10px 14px;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    transition: 0.2s;
}

.home-button:hover {
    background-color: #45a049;
    transform: scale(1.1);
}
</style>
</head>

<body>
<script>
  const password = "1234"; // הסיסמה שלך
  let userInput = prompt("הכנס סיסמה כדי להיכנס:");

  if (userInput !== password) {
        window.location.href = "denied.html"; // דף שגיאה
  }
</script>
<img src="3DStore_Logo.jpg" alt="Logo" style="width:200px; margin-bottom:20px;">
<h2>ברוכים הבאים לאיזור האישי</h2>

<input id="serialInput" placeholder="הכנס מספר כרטיס">
<button onclick="searchSerial()">חפש</button>

<div id="result"></div>

<script>

const database = [
    {name: "עמית -10% הנחה", serial: "219015"},
    {name: "איתי -10% הנחה", serial: "81510"},
    {name: "ינאי - 5% הנחה", serial: "1122 3344 5577 66"},
    {name: "ליה - 5% הנחה", serial: "2233 4455 6688 77"},
    {name: "אריאל - 5% הנחה", serial: "9090"}
];
    

function searchSerial(){

    const input = document.getElementById("serialInput").value;
    const result = document.getElementById("result");

    const found = database.find(item => item.serial === input);

    if(found){
        result.innerText = "השם הוא: " + found.name;
    }else{
        result.innerText = "לא נמצא מספר סידורי";
    }

}

</script>
<div class="home-button" onclick="window.location.href='index.html'">🏠</div>
</body>
</html>
