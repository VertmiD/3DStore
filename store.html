<head>

  <title>מוצרים ומחירים להזמנה בחנות שלנו</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #111;
      color: #fff;
      text-align: center;
    }header {
  padding: 20px;
  font-size: 28px;
  font-weight: bold;
  background-color: #222;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background-color: #1c1c1c;
  border-radius: 12px;
  padding: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  transition: transform 0.2s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.product-name {
  margin-top: 10px;
  font-size: 18px;
  font-weight: bold;
}

.price {
  color: #4CAF50;
  font-size: 16px;
  margin-top: 5px;
}
  .home-button {
    position: fixed;
    top: 15px;
    right: 15px;
    background-color: #4CAF50;
    color: white;
    font-size: 22px;
    padding: 10px 14px;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    transition: 0.2s;
  }

  .home-button:hover {
    background-color: #45a049;
    transform: scale(1.1);
  }
  </style>
</head>
