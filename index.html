<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>חנות 3D</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #111;
      color: #fff;
      text-align: center;
    }

    h1 {
      margin-top: 40px;
      font-size: 36px;
    }

    .main-image {
      margin: 30px auto;
      max-width: 300px;
      border-radius: 16px;
    }

    .buttons {
      margin: 20px;
    }

    .buttons button {
      margin: 10px;
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background-color: #4CAF50;
      color: white;
      transition: 0.2s;
    }

    .buttons button:hover {
      background-color: #45a049;
    }

    .whatsapp {
      margin-top: 30px;
      display: block;
      color: #25D366;
      font-size: 18px;
      text-decoration: none;
    }

    .whatsapp:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <h1>ברוכים הבאים לחנות של עמית ואיתי</h1>

  <!-- החלף את הנתיב לתמונה שלך -->
  <img src="3DStore_Logo.jpg" alt="תמונה ראשית" class="main-image">

  <div class="buttons">
    <button onclick="goLogin()">לאיזור האישי</button>
    <button onclick="goStore()">מחירון</button>
  </div>

  <!-- החלף לקישור לקבוצת הוואטסאפ שלך -->
  <a class="whatsapp" href="https://whatsapp.com/channel/0029VbCQejC5vKA2CMrGYV1K" target="_blank">
   WhatsApp-להצטרפות לקבוצת ה 
  </a>

  <script>
    function goLogin() {
      window.location.href = "vip.html"; // צור עמוד התחברות אם צריך
    }

    function goStore() {
      window.location.href = "store.html";
    }
  </script>

</body>
</html>
