<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>חיפוש לפי מספר סידורי</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    direction: rtl;
    background:#f4f4f4;
    margin-top:100px;
}

input{
    padding:10px;
    font-size:16px;
}

button{
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
}

#result{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<h2>חיפוש שם לפי מספר סידורי</h2>

<input id="serialInput" placeholder="הכנס מספר סידורי">
<button onclick="searchSerial()">חפש</button>

<div id="result"></div>

<script>

// כאן אתה מגדיר את ה"מסד נתונים"
const database = [
    {name: "עמית", serial: "219015"},
    {name: "איתי", serial: "54321"},
    {name: "רון", serial: "77665544332211"},
    {name: "אריאל", serial: "9090"}
    {name: "דניאל", serial: "200734"}
    {name: "שני", serial: "4404382"}
    {name: "יובל", serial: "123456"}
];

function searchSerial(){

    const input = document.getElementById("serialInput").value;
    const result = document.getElementById("result");

    const found = database.find(item => item.serial === input);

    if(found){
        result.innerText = "השם הוא: " + found.name;
    }else{
        result.innerText = "לא נמצא מספר סידורי";
    }

}

</script>

</body>

</html>
