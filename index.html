<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>החנות של עמית, רון ואיתי</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    direction: rtl;
    background:#f4f4f4;
    margin-top:100px;
}

input{
    padding:10px;
    font-size:16px;
}

button{
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
}

#result{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}
</style>
</head>

<body>
<img src="3DStore_Logo.jpg" alt="Logo" style="width:200px; margin-bottom:20px;">
<h2>ברוכים הבאים לחנות שלנו</h2>

<input id="serialInput" placeholder="הכנס מספר כרטיס">
<button onclick="searchSerial()">חפש</button>

<div id="result"></div>

<script>

const database = [
    {name: "10% עמית", serial: "219015"},
    {name: "איתי 10%", serial: "81510"},
    {name: "10% רון", serial: "119114"},
    {name: "5% אריאל", serial: "9090"}
];

function searchSerial(){

    const input = document.getElementById("serialInput").value;
    const result = document.getElementById("result");

    const found = database.find(item => item.serial === input);

    if(found){
        result.innerText = "השם הוא: " + found.name;
    }else{
        result.innerText = "לא נמצא מספר סידורי";
    }

}

</script>

</body>
</html>
