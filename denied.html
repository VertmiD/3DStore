<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>גישה נדחתה</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .container {
      background: #1c1c1c;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h1 {
      color: #ff4c4c;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background-color: #4CAF50;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #45a049;
    }
    .home-button {
    position: fixed;
    top: 15px;
    right: 15px;
    background-color: #4CAF50;
    color: white;
    font-size: 22px;
    padding: 10px 14px;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    transition: 0.2s;
    }

.home-button:hover {
    background-color: #45a049;
    transform: scale(1.1);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>⛔ גישה נדחתה</h1>
    <p>הסיסמה שהוזנה שגויה</p>
    <button onclick="goBack()">נסה שוב</button>
  </div>

  <script>
    function goBack() {
      window.location.href = "vip.html"; // חזרה לדף הראשי
    }
  </script>
  <div class="home-button" onclick="window.location.href='index.html'">🏠</div>
</body>
</html>
